<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32-S3 蓝牙电机控制终端 (全双工 v2)</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --accent: #3b82f6; --success: #22c55e; --warn: #f59e0b; --err: #ef4444; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: var(--card); padding: 1.5rem; border-radius: 16px; margin-bottom: 1rem; }
    h2 { margin: 0 0 1rem; font-size: 1.4rem; }
    #status { padding: 0.6rem; margin: 1rem 0; border-radius: 8px; text-align: center; font-weight: 600; background: #334155; }
    .connected { background: rgba(34,197,94,0.2); color: var(--success); border: 1px solid var(--success); }
    .disconnected { background: rgba(239,68,68,0.2); color: var(--err); border: 1px solid var(--err); }
    button { padding: 0.9rem; font-size: 1rem; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 0.6rem; background: var(--accent); color: #fff; }
    button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }
    .data-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin: 1rem 0; }
    .data-item { background: #0b1120; padding: 0.8rem; border-radius: 8px; text-align: center; border: 1px solid #334155; }
    .data-label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.3rem; }
    .data-value { font-size: 1.6rem; font-weight: 700; color: #38bdf8; }
    #log { height: 150px; overflow-y: auto; background: #0b1120; color: #a3e635; padding: 1rem; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.85rem; margin-top: 1rem; border: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔌 Web BLE 电机控制终端</h2>
    <div id="status" class="disconnected">⚪ 未连接设备</div>
    <button id="connectBtn" onclick="connectToDevice()">🔍 扫描并连接 Vibration_Egg3</button>

    <h3 style="margin:1rem 0 0.5rem">📊 实时传感器数据</h3>
    <div class="data-panel">
      <div class="data-item">
        <div class="data-label">FSR 压力值</div>
        <div class="data-value" id="fsrValue">--</div>
      </div>
      <div class="data-item">
        <div class="data-label">FSR 档位</div>
        <div class="data-value" id="fsrLevel">--</div>
      </div>
      <div class="data-item">
        <div class="data-label">电机档位</div>
        <div class="data-value" id="motorLevel">--</div>
      </div>
      <div class="data-item">
        <div class="data-label">通知状态</div>
        <div class="data-value" id="notifyStatus" style="font-size:1rem;">未订阅</div>
      </div>
    </div>
    <div id="log"></div>
  </div>
  <div style="text-align:center;font-size:0.8rem;color:#64748b;">⚠️ Chrome/Edge + localhost | 设备: Vibration_Egg3</div>

  <script>
    const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHAR_UUID    = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
    const NOTIFY_UUID  = 'cde5483e-36e1-4688-b7f5-ea07361b26a8';
    const DEVICE_NAME  = 'Vibration_Egg3';  // 与硬件一致

    let bleDevice = null;
    let writeChar = null;
    let notifyChar = null;

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      el.insertAdjacentHTML('afterbegin', `<div class="${cls}">[${time}] ${msg}</div>`);
      console.log('[WEB]', msg);
    }

    function handleNotify(event) {
      try {
        const jsonStr = new TextDecoder('utf-8').decode(event.target.value);
        console.log('[NOTIFY] 收到:', jsonStr);
        const data = JSON.parse(jsonStr);
        document.getElementById('fsrValue').textContent = data.fsr ?? '--';
        document.getElementById('fsrLevel').textContent = data.fsrLevel ?? '--';
        document.getElementById('motorLevel').textContent = data.motorLevel ?? '--';
        document.getElementById('notifyStatus').textContent = '接收中 ✅';
        document.getElementById('notifyStatus').style.color = '#22c55e';
      } catch (e) {
        console.error('[NOTIFY] 解析失败:', e);
      }
    }

    async function connectToDevice() {
      try {
        log('🔍 扫描设备...');
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: DEVICE_NAME }],
          optionalServices: [SERVICE_UUID]
        });
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        log('📡 建立GATT连接...');
        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        log('✅ 服务已获取');

        writeChar = await service.getCharacteristic(CHAR_UUID);
        log('✅ 写入特性就绪');

        notifyChar = await service.getCharacteristic(NOTIFY_UUID);
        log('🔔 通知特性已获取');

        // 关键：启动通知
        await notifyChar.startNotifications();
        notifyChar.addEventListener('characteristicvaluechanged', handleNotify);
        log('✅ 通知订阅成功！', 'success');
        document.getElementById('notifyStatus').textContent = '已订阅 ✅';
        document.getElementById('notifyStatus').style.color = '#22c55e';

        document.getElementById('status').textContent = '🟢 已连接 ' + DEVICE_NAME;
        document.getElementById('status').className = 'connected';
        document.getElementById('connectBtn').textContent = '🔌 断开连接';
        document.getElementById('connectBtn').onclick = () => bleDevice.gatt.disconnect();

      } catch (e) {
        console.error(e);
        log('❌ 连接失败: ' + e.message, 'error');
      }
    }

    function onDisconnected() {
      if (notifyChar) {
        notifyChar.removeEventListener('characteristicvaluechanged', handleNotify);
        notifyChar.stopNotifications().catch(() => {});
        notifyChar = null;
      }
      writeChar = null;
      document.getElementById('fsrValue').textContent = '--';
      document.getElementById('fsrLevel').textContent = '--';
      document.getElementById('motorLevel').textContent = '--';
      document.getElementById('notifyStatus').textContent = '未订阅';
      document.getElementById('notifyStatus').style.color = '';
      document.getElementById('status').textContent = '⚪ 已断开';
      document.getElementById('status').className = 'disconnected';
      document.getElementById('connectBtn').textContent = '🔍 扫描并连接 ' + DEVICE_NAME;
      document.getElementById('connectBtn').onclick = connectToDevice;
      log('🔌 已断开');
    }
  </script>
</body>
</html>
